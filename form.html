<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Gasto</title>
    <link rel="stylesheet" href="form.css?v=1.3">
</head>
<body>
    <header>
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html"><img title="Voltar" width="50" height="50" src="img/seta.png" alt="return"/></a>
        </div>
    </header>
    <main>
        <img src="img/cogumelos.png" alt="Cogumelos" class="desenho">
        <div id="aviso"></div>
        <div class="formCard">
            <h2>Adicionar gastos</h2>
            <hr>
            <form id="formGasto">
                <div class="nome">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="valor">
                    <label for="valor">Valor</label>
                    <input type="number" id="valor" step="0.01" min="0" required>
                </div>
                <div class="pagamento">
                    <label for="pagamento">Já foi pago?</label>
                    <select name="pagamento" id="pagamento">
                        <option value="" hidden disabled selected></option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="data">
                    <label for="data">Data</label>
                    <input type="date" id="data" required>
                </div>
                <div class="categorias">
                    <label for="categorias">Categorias</label>
                    <select name="categorias" id="categorias"></select>
                </div>
                <div class="tipo">
                    <label for="tipo">Tipo de pagamento</label>
                    <select name="tipo" id="tipo"></select>
                </div>
                <div class="botao">
                    <button type="submit">Salvar</button>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p>Todos os direitos reservados para <a href="https://github.com/Lorrany09" target="_blank" rel="noopener noreferrer">@Lorrany</a></p>
    </footer>
    <script src="salvarInformacoes.js?v=1.0"></script>
    <script>
        window.onload = function () {
            carregarCategorias();
            carregarPagamentos();
            document.getElementById('formGasto').addEventListener('submit', salvarGasto());
        }
    </script>
</body>
</html>
