<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de gastos</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main>
        <div class="formCard">
            <h2>Adicionar gastos</h2>
            <hr>
            <form id="formGasto">
                <div class="bloco1">
                    <div class="nome">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="valor">
                        <label for="valor">Valor</label>
                        <input type="number" id="valor" step="0.01" min="0" required>
                    </div>
                    <div class="pagamento">
                        <label for="pagamento">Já foi pago?</label>
                        <select name="pagamento" id="pagamento">
                            <option value="" hidden disabled selected></option>
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                        </select>
                    </div>
                </div>
                <div class="bloco2">
                    <div>
                        <label for="data">Data</label>
                        <input type="date" id="data" required>
                    </div>
                    <div>
                        <label for="categorias">Categorias</label>
                        <select name="categorias" id="categorias">
                            <option value="" hidden disabled selected></option>
                        </select>
                    </div>
                    <div class="tipo">
                        <label for="tipo">Tipo de pagamento</label>
                        <select name="tipo" id="tipo">
                            <option value="" hidden disabled selected></option>
                        </select>
                    </div>
                </div>
                <div class="botao">
                    <button type="submit">Salvar</button>
                </div>
            </form>
        </div>
        
        <div class="graficos-container">
            <div class="grafico-item">
                <h3>Total Pago</h3>
                <canvas id="graficoGastosPagos" width="200" height="200"></canvas>
            </div>
            <div class="grafico-item">
                <h3>Total Não Pago</h3>
                <canvas id="graficoGastosNaoPagos" width="200" height="200"></canvas>
            </div>
            <div class="grafico-item">
                <h3>Gastos por Categoria</h3>
                <canvas id="graficoPizzaCategorias" width="400" height="300"></canvas>
            </div>
            <div class="grafico-item">
                <h3>Evolução Mensal</h3>
                <canvas id="graficoLinhaMeses" width="400" height="300"></canvas>
            </div>
        </div>
        
        <div class="table-container">
            <h2>Compras pagas</h2>
            <table id="tabelaGastosPagos">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Data</th>
                        <th>Categoria</th>
                        <th>Valor</th>
                        <th>Tipo De Pagamento</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="listaGastosPagos"></tbody>
            </table>
            
            <h2>Compras não pagas</h2>
            <table id="tabelaGastosNaoPagos">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Data</th>
                        <th>Categoria</th>
                        <th>Valor</th>
                        <th>Tipo De Pagamento</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="listaGastosNaoPagos"></tbody>
            </table>
        </div>
    </main>
    <script src="funcoes.js"></script>
</body>
</html>
