<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de gastos</title>
    <link rel="stylesheet" href="index.css?v=2.2">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main>
        <div class="formCard">
            <h2>Adicionar gastos</h2>
            <hr>
            <form id="formGasto">
                <div class="nome">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="valor">
                    <label for="valor">Valor</label>
                    <input type="number" id="valor" step="0.01" min="0" required>
                </div>
                <div class="pagamento">
                    <label for="pagamento">Já foi pago?</label>
                    <select name="pagamento" id="pagamento">
                        <option value="" hidden disabled selected></option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="data">
                    <label for="data">Data</label>
                    <input type="date" id="data" required>
                </div>
                <div class="categorias">
                    <label for="categorias">Categorias</label>
                    <select name="categorias" id="categorias"></select>
                </div>
                <div class="tipo">
                    <label for="tipo">Tipo de pagamento</label>
                    <select name="tipo" id="tipo"></select>
                </div>
                <div class="botao">
                    <button type="submit">Salvar</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <div class="tabelaGastosPagos">
                <table id="tabelaGastosPagos">
                    <thead>
                        <tr>
                            <th colspan="6" id="tituloPrincipal">Compras pagas</th>
                        </tr>
                        <tr>
                            <th>Nome</th>
                            <th>Data</th>
                            <th>Categoria</th>
                            <th>Valor</th>
                            <th>Tipo De Pagamento</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="listaGastosPagos"></tbody>
                </table>
            </div>
            
            <div class="tabelaGastosNaoPagos">
                <table id="tabelaGastosNaoPagos">
                    <thead>
                        <tr>
                            <th colspan="6" id="tituloPrincipal">Compras não pagas</th>
                        </tr>
                        <tr>
                            <th>Nome</th>
                            <th>Data</th>
                            <th>Categoria</th>
                            <th>Valor</th>
                            <th>Tipo De Pagamento</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="listaGastosNaoPagos"></tbody>
                </table>
            </div>
        </div>
        
        <div class="tituloGrafico">
            <h2>Gráficos</h2>
        </div>
        <div class="graficos-container">
            <div class="grafico-comparativo">
                <h3>Gastos pagos vs Não pagos</h3>
                <canvas id="graficoBarrasComparativo" width="400" height="300"></canvas>
            </div>
            <div class="grafico-categoria">
                <h3>Gastos por Categoria</h3>
                <canvas id="graficoPizzaCategorias" width="400" height="300"></canvas>
            </div>
            <div class="grafico-mensal">
                <h3>Evolução Mensal</h3>
                <canvas id="graficoLinhaMeses" width="400" height="300"></canvas>
            </div>
        </div>
    </main>
    <footer>
        <p>Todos os direitos reservados para <a href="https://github.com/Lorrany09" target="_blank" rel="noopener noreferrer">@Lorrany</a></p>
    </footer>
    <script src="funcoes.js?v=2"></script>
    <script>
        window.onload = function () {
            carregarCategorias();
            carregarPagamentos();
            carregarListaGastos();
            carregarGraficoPorCategoria();
            carregarGraficoComparativo();
            carregarGraficoPorMes();
        }
    </script>
</body>
</html>
